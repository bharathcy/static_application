name: Deploy to AWS EC2

# Deploy the static site to an Nginx web root on an EC2 instance
# whenever changes land on main (or when run manually).
on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "style.css"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${EC2_PORT:-22}" -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}

      - name: Deploy files to EC2 via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${EC2_PORT:-22}" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='SECRETS.md' \
            index.html style.css \
            "${EC2_USER}@${EC2_HOST}:${EC2_TARGET_DIR}/"
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_TARGET_DIR: ${{ secrets.EC2_TARGET_DIR }}

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key -p "${EC2_PORT:-22}" \
            "${EC2_USER}@${EC2_HOST}" \
            "sudo nginx -t && sudo systemctl reload nginx"
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}

      - name: Deployment summary
        run: |
          echo "### ✅ Deployed to EC2" >> "$GITHUB_STEP_SUMMARY"
          echo "Static site synced to \`${EC2_TARGET_DIR}\` and Nginx reloaded." >> "$GITHUB_STEP_SUMMARY"
        env:
          EC2_TARGET_DIR: ${{ secrets.EC2_TARGET_DIR }}
