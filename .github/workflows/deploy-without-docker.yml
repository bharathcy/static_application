name: Deploy to AWS EC2 (without Docker)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy static files & reload Nginx
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key && chmod 600 key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete -e "ssh -i key" index.html style.css \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/${{ secrets.DOMAIN }}/"
          ssh -i key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "sudo systemctl reload nginx"
